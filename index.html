<script>

const html = `

style="width:320px;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,0.18);">

${duration}
</span>

</div>

<div style="margin-top:28px;">

<a href="${download}"
download
style="

function copyHTML(){


    const textIs = document.getElementById('output').textContent

    if(navigator.clipboard){

        navigator.clipboard.writeText(textIs)

        .then(()=>{

            alert("Template Copied!");
        });

    }else{

        const textarea = document.createElement('textarea');

        textarea.value = textIs;

        document.body.appendChild(textarea);

        textarea.select();

        document.execCommand('copy');

        document.body.removeChild(textarea);

        alert("Template Copied!");
        
    }


}
